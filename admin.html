<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Site — Ana Chandlee</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  #cursor-glow { display: none !important; }
  .admin-wrap { max-width: 760px; margin: 0 auto; padding: 60px 24px 100px; }
  .admin-card { background: #fff; border-radius: 24px; padding: 36px; box-shadow: 0 10px 40px rgba(224,69,123,0.08); margin-bottom: 24px; }
  .admin-card h2 { font-family: "Fraunces", serif; font-style: italic; font-size: 22px; margin: 0 0 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 6px; letter-spacing: 0.02em; text-transform: uppercase; }
  .field input, .field textarea {
    width: 100%; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--line);
    font-family: inherit; font-size: 14.5px; color: var(--ink); background: var(--bg-raised, #FFF6F8);
  }
  .field textarea { min-height: 90px; resize: vertical; }
  .field input:focus, .field textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .cred-item { border: 1px solid var(--line); border-radius: 16px; padding: 18px; margin-bottom: 14px; position: relative; }
  .cred-item .remove-btn {
    position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .cred-item .remove-btn:hover { color: var(--accent); }
  .btn-soft {
    display: inline-flex; align-items: center; gap: 6px; padding: 11px 20px; border-radius: 100px;
    border: 1px solid var(--accent); color: var(--accent); background: var(--accent-soft, #FBDCEA);
    font-size: 13.5px; font-weight: 600; cursor: pointer; text-decoration: none;
  }
  .btn-soft:hover { background: var(--accent); color: #fff; }
  .btn-dark {
    display: inline-flex; align-items: center; gap: 6px; padding: 13px 26px; border-radius: 100px;
    border: none; background: var(--ink); color: #fff; font-size: 14.5px; font-weight: 600; cursor: pointer;
  }
  .btn-dark:hover { background: var(--accent); }
  .save-bar { position: sticky; bottom: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    border-top: 1px solid var(--line); padding: 16px 24px; display: flex; gap: 12px; align-items: center; justify-content: space-between; }
  .save-status { font-size: 13px; color: var(--muted); }
  .lock-screen { max-width: 380px; margin: 120px auto; text-align: center; padding: 40px; background: #fff; border-radius: 24px; box-shadow: 0 10px 40px rgba(224,69,123,0.10); }
  .lock-screen input { text-align: center; margin: 16px 0; }
  .error-text { color: var(--accent); font-size: 13px; margin-top: 8px; }
  .note { font-size: 13px; color: var(--muted); margin-top: -6px; margin-bottom: 18px; }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a href="index.html" class="nav-name">Ana Chandlee</a>
    <div class="links">
      <a href="index.html">‹ Back to site</a>
    </div>
  </div>
</nav>

<div id="lock-screen" class="lock-screen">
  <h2 class="serif" style="font-style:italic; font-size:24px; margin:0 0 6px;">Edit your site</h2>
  <p class="note" style="margin:0 0 0;">Log in to make changes.</p>
  <input type="email" id="email-input" placeholder="Email" autocomplete="username" />
  <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
  <div><button class="btn-dark" id="unlock-btn">Log in</button></div>
  <div id="password-error" class="error-text"></div>
</div>

<div id="admin-content" class="admin-wrap" style="display:none;"></div>

<div id="save-bar" class="save-bar" style="display:none;">
  <span class="save-status" id="save-status">Changes save live to your site instantly.</span>
  <div style="display:flex; gap:10px;">
    <button class="btn-soft" id="download-btn">Download content.js</button>
    <button class="btn-dark" id="save-btn">Save changes</button>
    <button class="btn-soft" id="logout-btn">Log out</button>
  </div>
</div>

<script src="content.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="admin.js"></script>
</body>
</html>
