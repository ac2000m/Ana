name: Sync preview branches to main

# Whenever main changes, automatically make preview2 an exact copy of it.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force preview2 to match main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B preview2 origin/main
          git push --force origin preview2
