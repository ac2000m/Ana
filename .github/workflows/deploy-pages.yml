name: Deploy site (main + preview + preview2)

on:
  push:
    branches:
      - main
      - preview
      - preview2
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: site-main

      - name: Checkout preview branch (if it exists)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: preview
          path: site-preview

      - name: Checkout preview2 branch (if it exists)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: preview2
          path: site-preview2

      - name: Assemble combined site
        run: |
          mkdir -p combined
          cp -r site-main/. combined/
          if [ -d "site-preview" ]; then
            mkdir -p combined/preview
            cp -r site-preview/. combined/preview/
          fi
          if [ -d "site-preview2" ]; then
            mkdir -p combined/preview2
            cp -r site-preview2/. combined/preview2/
          fi
          rm -rf combined/.github combined/preview/.github combined/preview2/.github 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
